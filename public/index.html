<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigos5v5 - Dota 2 Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dotablack: '#0d0d0d',
                        dotadark: '#1a1a1a',
                        dotagray: '#2a2a2a',
                        dotagold: '#c8aa6e',
                        dotared: '#8b0000',
                        dotaredlight: '#a52a2a'
                    }
                }
            }
        }
function toggleMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('hidden');
}
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dotablack text-gray-200 font-sans">
    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 hidden">
        <div class="bg-dotadark border-2 border-dotagold p-8 rounded-lg w-96 shadow-2xl">
            <h2 class="text-2xl text-dotagold font-bold text-center mb-6">INGRESAR</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Usuario" 
                    class="w-full bg-dotagray border border-gray-600 rounded px-4 py-3 mb-4 focus:border-dotagold focus:outline-none text-white">
                <input type="password" id="password" placeholder="Contraseña" 
                    class="w-full bg-dotagray border border-gray-600 rounded px-4 py-3 mb-6 focus:border-dotagold focus:outline-none text-white">
                <button type="submit" 
                    class="w-full bg-dotared hover:bg-dotaredlight text-white font-bold py-3 rounded transition-colors">
                    INGRESAR
                </button>
            </form>
            <p id="loginError" class="text-red-500 text-center mt-4 hidden">Credenciales incorrectas</p>
            <button onclick="closeLogin()" class="w-full text-gray-400 mt-4 hover:text-white">CANCELAR</button>
        </div>
    </div>

    <!-- New Match Modal -->
    <div id="newMatchModal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 hidden overflow-auto">
        <div class="bg-dotadark border-2 border-dotagold p-6 rounded-lg w-full max-w-4xl mx-4 my-8 shadow-2xl">
            <h2 class="text-2xl text-dotagold font-bold text-center mb-6">NUEVA PARTIDA</h2>
            
            <form id="newMatchForm" class="space-y-4">
                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-dotagold text-sm mb-1">Fecha</label>
                        <input type="date" id="matchDate" required
                            class="w-full bg-dotagray border border-gray-600 rounded px-3 py-2 focus:border-dotagold focus:outline-none text-white">
                    </div>
                    <div>
                        <label class="block text-dotagold text-sm mb-1">Mapa</label>
                        <select id="matchMap" class="w-full bg-dotagray border border-gray-600 rounded px-3 py-2 focus:border-dotagold focus:outline-none text-white">
                            <option value="Warcraft 3">Warcraft 3</option>
                            <option value="Dota 2 Original">Dota 2 Original</option>
                            <option value="Dota 2 Reborn">Dota 2 Reborn</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-dotagold text-sm mb-1">Duración</label>
                        <div class="flex gap-2">
                            <input type="number" id="matchHours" min="0" max="3" placeholder="hr" value="0"
                                class="w-full bg-dotagray border border-gray-600 rounded px-2 py-2 focus:border-dotagold focus:outline-none text-white text-center">
                            <input type="number" id="matchMinutes" min="0" max="59" placeholder="min" value="0"
                                class="w-full bg-dotagray border border-gray-600 rounded px-2 py-2 focus:border-dotagold focus:outline-none text-white text-center">
                            <input type="number" id="matchSeconds" min="0" max="59" placeholder="seg" value="0"
                                class="w-full bg-dotagray border border-gray-600 rounded px-2 py-2 focus:border-dotagold focus:outline-none text-white text-center">
                        </div>
                    </div>
                </div>

                <!-- Captains -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-dotagold text-sm mb-1">Capitán DIRE (Rojo)</label>
                        <select id="captainDire" onchange="updateAvailablePlayers()"
                            class="w-full bg-dotagray border border-gray-600 rounded px-3 py-2 focus:border-dotagold focus:outline-none text-white">
                            <option value="">Seleccionar Capitán</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-blue-400 text-sm mb-1">Capitán RADIANT (Azul)</label>
                        <select id="captainRadiant" onchange="updateAvailablePlayers()"
                            class="w-full bg-dotagray border border-gray-600 rounded px-3 py-2 focus:border-dotagold focus:outline-none text-white">
                            <option value="">Seleccionar Capitán</option>
                        </select>
                    </div>
                </div>

                <!-- Teams Selection -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Available Players -->
                    <div>
                        <label class="block text-gray-400 text-sm mb-1">Jugadores Disponibles</label>
                        <div id="availablePlayers" class="bg-dotagray rounded p-2 max-h-48 overflow-y-auto space-y-1">
                            <!-- Players will be injected here -->
                        </div>
                    </div>
                    
                    <!-- Dire Team -->
                    <div>
                        <label class="block text-red-400 text-sm mb-1">Equipo DIRE (5 jugadores)</label>
                        <div id="teamDire" class="bg-dotadark border border-red-800 rounded p-2 min-h-[200px] max-h-48 overflow-y-auto space-y-1">
                        </div>
                    </div>
                    
                    <!-- Radiant Team -->
                    <div>
                        <label class="block text-blue-400 text-sm mb-1">Equipo RADIANT (5 jugadores)</label>
                        <div id="teamRadiant" class="bg-dotadark border border-blue-800 rounded p-2 min-h-[200px] max-h-48 overflow-y-auto space-y-1">
                        </div>
                    </div>
                </div>

                <!-- Heroes Assignment -->
                <div id="heroesSection" class="hidden">
                    <h3 class="text-dotagold font-bold mb-2">Asignar Héroes</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-dotadark border border-red-800 rounded p-3">
                            <h4 class="text-red-400 font-bold text-sm mb-2">Equipo DIRE</h4>
                            <div id="heroesDire" class="space-y-2"></div>
                        </div>
                        <div class="bg-dotadark border border-blue-800 rounded p-3">
                            <h4 class="text-blue-400 font-bold text-sm mb-2">Equipo RADIANT</h4>
                            <div id="heroesRadiant" class="space-y-2"></div>
                        </div>
                    </div>
                </div>

                <!-- Winner & MVP -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-dotagold text-sm mb-2">Ganador</label>
                        <div class="flex gap-4">
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="winner" value="Dire" class="mr-2 accent-red-500">
                                <span class="text-red-400 font-bold">DIRE</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="winner" value="Radiant" class="mr-2 accent-blue-500">
                                <span class="text-blue-400 font-bold">RADIANT</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-dotagold text-sm mb-1">MVP (opcional)</label>
                        <select id="matchMVP"
                            class="w-full bg-dotagray border border-gray-600 rounded px-3 py-2 focus:border-dotagold focus:outline-none text-white">
                            <option value="-">Sin MVP</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button type="button" onclick="proceedToHeroes()" id="btnProceedHeroes"
                            class="w-full bg-dotagold text-dotablack font-bold py-2 rounded hover:bg-yellow-600 transition-colors" disabled>
                           SIGUIENTE: HÉROES →
                        </button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-4 pt-4 border-t border-gray-700">
                    <button type="button" onclick="saveNewMatch()" id="btnSaveMatch"
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded transition-colors hidden">
                        GUARDAR PARTIDA
                    </button>
                    <button type="button" onclick="closeNewMatchModal()" 
                        class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded transition-colors">
                        CANCELAR
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Mantencion Modal -->
    <div id="mantencionModal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 hidden overflow-auto">
        <div class="bg-dotadark border-2 border-dotagold p-6 rounded-lg w-full max-w-3xl mx-4 my-8 shadow-2xl">
            <h2 class="text-2xl text-dotagold font-bold text-center mb-6">⚙️ MANTENCIÓN DE JUGADORES</h2>
            
            <div id="mantencionList" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
                <!-- Players will be injected here -->
            </div>
            
            <div class="flex gap-4 pt-4 border-t border-gray-700 mt-4">
                <button onclick="saveMantencion()" 
                    class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded transition-colors">
                    GUARDAR CAMBIOS
                </button>
                <button onclick="closeMantencionModal()" 
                    class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded transition-colors">
                    CANCELAR
                </button>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Mobile Header -->
        <header class="md:hidden bg-dotadark border-b border-dotagold p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-dotagold">AMIGOS5v5</h1>
            <button onclick="toggleMobileMenu()" class="text-dotagold">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </header>

        <!-- Sidebar -->
        <aside id="sidebar" class="w-full md:w-64 bg-dotadark border-r border-dotagold flex-col hidden md:flex">
            <!-- Logo -->
            <div class="p-4 border-b border-dotagray">
                <h1 class="text-2xl font-bold text-dotagold text-center hidden md:block">AMIGOS5v5</h1>
                <p class="text-xs text-gray-500 text-center hidden md:block">Dota 2 Stats</p>
            </div>

            <!-- Login Button / User Info -->
            <div class="p-4 border-b border-dotagray">
                <div id="loginSection">
                    <button onclick="openLogin()" 
                        class="w-full bg-dotagold text-dotablack font-bold py-2 rounded hover:bg-yellow-600 transition-colors">
                        LOGIN ADMIN
                    </button>
                    <p class="text-xs text-gray-500 text-center mt-2">Solo admins pueden votar MVP</p>
                </div>
                <div id="userSection" class="hidden">
                    <p class="text-dotagold text-center font-bold" id="userName"></p>
                    <button onclick="logout()" class="text-xs text-gray-500 hover:text-white mt-1 block w-full text-center">CERRAR SESIÓN</button>
                </div>
            </div>

            <!-- Players List -->
            <div class="flex-1 overflow-y-auto p-4">
                <h3 class="text-dotagold font-bold mb-3">JUGADORES</h3>
                <div id="playersList" class="space-y-2">
                    <!-- Players will be injected here -->
                </div>
            </div>

            <!-- Stats Summary -->
            <div class="p-4 border-t border-dotagray">
                <h3 class="text-dotagold font-bold mb-2">RESUMEN</h3>
                <div class="text-sm space-y-1">
                    <p>Partidas: <span class="text-dotagold" id="totalGames">0</span></p>
                    <p>Victorias Dire: <span class="text-dotared" id="direWins">0</span></p>
                    <p>Victorias Radiant: <span class="text-blue-400" id="radiantWins">0</span></p>
                </div>
            </div>

            <!-- Mantencion Button (Admin only) -->
            <div id="mantencionSection" class="p-4 border-t border-dotagray hidden">
                <button onclick="openMantencionModal()" 
                    class="w-full bg-dotagray hover:bg-dotagold hover:text-dotablack text-gray-300 font-bold py-2 rounded transition-colors text-sm">
                    ⚙️ Mantención
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-6 overflow-y-auto">
            <!-- Header -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 md:mb-6 gap-3">
                <h2 class="text-2xl md:text-3xl font-bold text-dotagold">HISTORIAL DE PARTIDAS</h2>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="btnNewMatch" onclick="openNewMatchModal()" 
                        class="hidden bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition-colors text-sm">
                        + Nueva Partida
                    </button>
                    <select id="filterPlayer" onchange="filterByPlayer()" class="bg-dotagray border border-gray-600 rounded px-3 py-2 text-sm focus:border-dotagold focus:outline-none flex-1 sm:flex-none">
                        <option value="">Todos los jugadores</option>
                    </select>
                </div>
            </div>

            <!-- Matches -->
            <div id="matchesList" class="space-y-4">
                <!-- Matches will be injected here -->
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
