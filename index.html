<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigos5v5 - Dota 2 Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dotablack: '#0d0d0d',
                        dotadark: '#1a1a1a',
                        dotagray: '#2a2a2a',
                        dotagold: '#c8aa6e',
                        dotared: '#8b0000',
                        dotaredlight: '#a52a2a'
                    }
                }
            }
        }
function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dotablack text-gray-200 font-sans">
    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 hidden">
        <div class="bg-dotadark border-2 border-dotagold p-8 rounded-lg w-96 shadow-2xl">
            <h2 class="text-2xl text-dotagold font-bold text-center mb-6">INGRESAR</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Usuario" 
                    class="w-full bg-dotagray border border-gray-600 rounded px-4 py-3 mb-4 focus:border-dotagold focus:outline-none text-white">
                <input type="password" id="password" placeholder="Contraseña" 
                    class="w-full bg-dotagray border border-gray-600 rounded px-4 py-3 mb-6 focus:border-dotagold focus:outline-none text-white">
                <button type="submit" 
                    class="w-full bg-dotared hover:bg-dotaredlight text-white font-bold py-3 rounded transition-colors">
                    INGRESAR
                </button>
            </form>
            <p id="loginError" class="text-red-500 text-center mt-4 hidden">Credenciales incorrectas</p>
            <button onclick="closeLogin()" class="w-full text-gray-400 mt-4 hover:text-white">CANCELAR</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Mobile Header -->
        <header class="md:hidden bg-dotadark border-b border-dotagold p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-dotagold">AMIGOS5v5</h1>
            <button onclick="toggleMobileMenu()" class="text-dotagold">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </header>

        <!-- Sidebar -->
        <aside id="sidebar" class="w-full md:w-64 bg-dotadark border-r border-dotagold flex-col hidden md:flex">
            <!-- Logo -->
            <div class="p-4 border-b border-dotagray">
                <h1 class="text-2xl font-bold text-dotagold text-center hidden md:block">AMIGOS5v5</h1>
                <p class="text-xs text-gray-500 text-center hidden md:block">Dota 2 Stats</p>
            </div>

            <!-- Login Button / User Info -->
            <div class="p-4 border-b border-dotagray">
                <div id="loginSection">
                    <button onclick="openLogin()" 
                        class="w-full bg-dotagold text-dotablack font-bold py-2 rounded hover:bg-yellow-600 transition-colors">
                        LOGIN ADMIN
                    </button>
                    <p class="text-xs text-gray-500 text-center mt-2">Solo admins pueden votar MVP</p>
                </div>
                <div id="userSection" class="hidden">
                    <p class="text-dotagold text-center font-bold" id="userName"></p>
                    <button onclick="logout()" class="text-xs text-gray-500 hover:text-white mt-1 block w-full text-center">CERRAR SESIÓN</button>
                </div>
            </div>

            <!-- Players List -->
            <div class="flex-1 overflow-y-auto p-4">
                <h3 class="text-dotagold font-bold mb-3">JUGADORES</h3>
                <div id="playersList" class="space-y-2">
                    <!-- Players will be injected here -->
                </div>
            </div>

            <!-- Stats Summary -->
            <div class="p-4 border-t border-dotagray">
                <h3 class="text-dotagold font-bold mb-2">RESUMEN</h3>
                <div class="text-sm space-y-1">
                    <p>Partidas: <span class="text-dotagold" id="totalGames">0</span></p>
                    <p>Victorias Dire: <span class="text-dotared" id="direWins">0</span></p>
                    <p>Victorias Radiant: <span class="text-blue-400" id="radiantWins">0</span></p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-6 overflow-y-auto">
            <!-- Header -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 md:mb-6 gap-3">
                <h2 class="text-2xl md:text-3xl font-bold text-dotagold">HISTORIAL DE PARTIDAS</h2>
                <select id="filterPlayer" onchange="filterByPlayer()" class="bg-dotagray border border-gray-600 rounded px-3 py-2 text-sm focus:border-dotagold focus:outline-none w-full sm:w-auto">
                    <option value="">Todos los jugadores</option>
                </select>
            </div>

            <!-- Matches -->
            <div id="matchesList" class="space-y-4">
                <!-- Matches will be injected here -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
